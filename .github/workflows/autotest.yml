name: Automated Test
on: [push]
jobs:
  automated_test:
    name: Automated Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Test 1
        run: |
          python3 find_lowest_number.py test_data/test1_input.txt actual1.txt
          diff test_data/test1_expected.txt actual1.txt
      - name: Test 2
        run: |
          python3 find_lowest_number.py test_data/test2_input.txt actual2.txt
          diff test_data/test2_expected.txt actual2.txt
      - name: Test 3
        run: |
          python3 find_lowest_number.py test_data/test3_input.txt actual3.txt
          diff test_data/test3_expected.txt actual3.txt
